version: '3.8'

services:

  db:
    image: postgres:15-alpine
    container_name: inventory_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventory_management_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: 1234
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inventory_network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_management_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory_backend
    restart: unless-stopped
    environment:
      FLASK_APP: run.py
      FLASK_ENV: production
      FLASK_DEBUG: 0
      SECRET_KEY: super-secret-production-key-change-this
      DATABASE_URL: postgresql://inventory_user:1234@db:5432/inventory_management_db
      FRONTEND_URL: http://localhost:3000
    networks:
      - inventory_network
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/venv

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventory_frontend
    restart: unless-stopped
    networks:
      - inventory_network
    ports:
      - "3000:80"
    depends_on:
      - backend

networks:
  inventory_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local